name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://suporte.ordussystem.com.br

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_PAGES_API_TOKEN }}
          accountId: 50cf2413cc4834b290d475896d5a4465
          projectName: ordus-support
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Submit URLs to Google Search Console
        if: success() && env.GSC_KEY_AVAILABLE == 'true'
        env:
          GOOGLE_SEARCH_CONSOLE_KEY: ${{ secrets.GOOGLE_SEARCH_CONSOLE_KEY }}
          NEXT_PUBLIC_SITE_URL: https://suporte.ordussystem.com.br
          GSC_KEY_AVAILABLE: ${{ secrets.GOOGLE_SEARCH_CONSOLE_KEY != '' && 'true' || 'false' }}
        run: npm run gsc-submit
        continue-on-error: true

      - name: Notify QA webhook
        if: success()
        run: |
          curl -X POST "${{ secrets.N8N_WEBHOOK_QA }}" \
            -H "Content-Type: application/json" \
            -d '{"event":"deploy_complete","repo":"ordusdigital/ordus-support","branch":"main"}'
        continue-on-error: true
