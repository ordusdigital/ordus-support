version: '3.8'

services:
  screenshot-worker:
    image: ordusdigital/screenshot-worker:latest
    environment:
      - ORDUS_SYSTEM_URL=${ORDUS_SYSTEM_URL}
      - ORDUS_DEMO_EMAIL=${ORDUS_DEMO_EMAIL}
      - ORDUS_DEMO_PASSWORD=${ORDUS_DEMO_PASSWORD}
      - ORDUS_DEMO_LOCATION_ID=${ORDUS_DEMO_LOCATION_ID}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REPO=ordusdigital/ordus-support
      - GOOGLE_SHEETS_ID=${GOOGLE_SHEETS_ID}
      - SLACK_WEBHOOK_KAUAN=${SLACK_WEBHOOK_KAUAN}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY}
      - WHATSAPP_LEANDRO=${WHATSAPP_LEANDRO}
    ports:
      - "3001:3001"
    networks:
      - OrdusNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

networks:
  OrdusNet:
    external: true
